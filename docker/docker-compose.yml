services:

  postgres:
    image: postgres:16
    container_name: finpay-postgres

    environment:
      POSTGRES_DB: finpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: finpay-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data: