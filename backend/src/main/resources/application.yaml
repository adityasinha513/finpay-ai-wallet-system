# =============================================================================
# FinPay backend configuration
# =============================================================================

spring:
  application:
    name: finpay-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finpay}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cache:
    type: redis

    redis:
      time-to-live: 600000

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      chat:
        options:
          model: gpt-4o-mini

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET:finpaySuperSecureJwtSecretKey2026BackendAuthSystem}
  expiration: ${JWT_EXPIRATION:3600000}