# =============================================================================
# FinPay backend — shared configuration
# Activate with SPRING_PROFILES_ACTIVE (default: dev). Use "prod" in production.
# =============================================================================

spring:
  application:
    name: finpay-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finpay}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:3s}
      lettuce:
        pool:
          max-active: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE:16}
          max-idle: 8
          min-idle: 2
        shutdown-timeout: 100ms

  cache:
    type: redis
    redis:
      time-to-live: 600000

  ai:
    openai:
      # Non-blank placeholder so the context starts when OPENAI_API_KEY is unset (dev/test).
      # Production profile overrides this with ${OPENAI_API_KEY} only (no default).
      api-key: ${OPENAI_API_KEY:sk-finpay-placeholder-not-a-real-openai-key}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}

  task:
    scheduling:
      pool:
        size: 2

server:
  port: 8080

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health
  endpoint:
    health:
      enabled: true
      show-details: never
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.finpay.backend: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

jwt:
  expiration: ${JWT_EXPIRATION:3600000}

finpay:
  monitoring:
    initial-delay-ms: 90000
    fixed-delay-ms: 300000
