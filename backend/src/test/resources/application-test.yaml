# Test profile: in-memory DB, no Redis — keeps `contextLoads` portable for CI/local without Docker.
jwt:
  secret: ${JWT_SECRET:test-finpay-jwt-hmac-signing-key-32chars!!}

spring:
  datasource:
    url: jdbc:h2:mem:finpay;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
